<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a227f" />
    <title>Offline | BlogPlatform</title>
    <style>
      :root {
        --bg: #f6f6f8;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --brand: #1a227f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(26, 34, 127, 0.08), transparent 45%),
          radial-gradient(circle at 80% 10%, rgba(26, 34, 127, 0.06), transparent 40%),
          var(--bg);
        color: var(--text);
      }

      .card {
        width: min(100%, 520px);
        background: var(--card);
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(17, 24, 39, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        display: inline-block;
        background: var(--brand);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-labelledby="offline-title">
      <h1 id="offline-title">You are offline</h1>
      <p>
        BlogPlatform could not load this page because your network connection is unavailable.
        Reconnect and try again.
      </p>
      <a href="/">Return Home</a>
    </main>
  </body>
  </html>
