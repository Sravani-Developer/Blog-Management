<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Post - BlogManager</title>
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #1f2b93;
        --bg: #f3f5f9;
        --card: #ffffff;
        --text: #1c2f4a;
        --muted: #7a8eaa;
        --line: #dce4ef;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Work Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .topbar {
        background: #fff;
        border-bottom: 1px solid var(--line);
        padding: 10px 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--primary);
        font-size: 32px;
        font-weight: 800;
      }

      .brand svg {
        width: 36px;
        height: 36px;
      }

      .menu {
        display: flex;
        gap: 24px;
        align-items: center;
      }

      .menu a,
      .menu button {
        color: #4f6482;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        border: 0;
        background: transparent;
        padding: 0;
      }

      .menu a.active {
        color: var(--primary);
        border-bottom: 2px solid var(--primary);
        padding-bottom: 8px;
      }

      .page {
        max-width: 1320px;
        margin: 0 auto;
        padding: 24px 22px 26px;
      }

      .crumb {
        color: #788da7;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .crumb .sep { margin: 0 8px; }

      .title {
        font-size: 40px;
        font-weight: 800;
        color: var(--primary);
        margin: 0;
        line-height: 1.05;
      }

      .subtitle {
        margin: 8px 0 28px;
        color: #6c81a0;
        font-size: 18px;
      }

      .field-card,
      .editor-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
      }

      .field-card {
        padding: 18px 20px;
        margin-bottom: 14px;
      }

      .label {
        color: #8a9dbc;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .field-input {
        width: 100%;
        border: 0;
        outline: none;
        background: transparent;
        color: #2f4663;
        font-size: 18px;
        font-weight: 700;
        height: 56px;
      }

      .field-input::placeholder,
      .editor::placeholder { color: #b4bfd4; }

      .toolbar {
        border-bottom: 1px solid var(--line);
        background: #f8faff;
        padding: 12px;
      }

      .editor {
        width: 100%;
        min-height: 540px;
        border: 0;
        outline: none;
        resize: vertical;
        padding: 20px;
        font-size: 16px;
        color: #2f4663;
      }

      .actions {
        margin-top: 24px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .btn-ghost {
        border: 1px solid #c8d4e5;
        background: #fff;
        color: #293f5c;
        border-radius: 10px;
        font-weight: 700;
        font-size: 16px;
        padding: 10px 22px;
      }

      .btn-main {
        border: 0;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        font-weight: 700;
        font-size: 16px;
        padding: 10px 22px;
      }

      .status {
        margin-top: 12px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="d-flex align-items-center justify-content-between">
        <div class="brand">
          <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 12C8 9.79086 9.79086 8 12 8H36C38.2091 8 40 9.79086 40 12V36C40 38.2091 38.2091 40 36 40H12C9.79086 40 8 38.2091 8 36V12Z" fill="currentColor"></path>
            <path d="M16 16H32V20H16V16Z" fill="#fff"></path>
            <path d="M16 24H32V28H16V24Z" fill="#fff"></path>
            <path d="M16 32H24V36H16V32Z" fill="#fff"></path>
          </svg>
          BlogManager
        </div>
        <nav class="menu">
          <a href="/admin/home">Home</a>
          <a class="active" href="/admin/posts/ui">Blog</a>
          <a href="/admin/me/ui">About</a>
          <a href="/admin/contact/ui">Contact</a>
          <button id="logoutBtn" type="button">Logout</button>
        </nav>
      </div>
    </header>

    <main class="page">
      <div class="crumb">
        Dashboard <span class="sep">›</span> Posts <span class="sep">›</span>
        <strong style="color: var(--primary)">Edit Post</strong>
      </div>
      <h1 class="title">Edit Post</h1>
      <p class="subtitle">Update title and content, then save your changes.</p>

      <form id="postForm">
        <div class="field-card">
          <div class="label">Post Title</div>
          <input id="title" class="field-input" type="text" placeholder="Enter post title..." required />
        </div>

        <div class="editor-card">
          <div class="toolbar"><strong>Content</strong></div>
          <textarea id="content" class="editor" placeholder="Write your content..." required></textarea>
        </div>

        <div class="actions">
          <button id="cancelBtn" class="btn-ghost" type="button">Cancel</button>
          <button class="btn-main" type="submit">Save Changes</button>
        </div>
        <div id="status" class="status"></div>
      </form>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      const postId = window.location.pathname.split("/")[3];

      const setStatus = (msg, isError = false) => {
        $("#status")
          .removeClass("text-success text-danger")
          .addClass(isError ? "text-danger" : "text-success")
          .text(msg);
      };

      const loadPost = async () => {
        try {
          const meRes = await fetch("/admin/me");
          if (meRes.status === 401) {
            window.location.href = "/admin/login";
            return;
          }
          const meJson = await meRes.json();
          if (!meRes.ok || !meJson.success) throw new Error("Unauthorized");
          const admin = meJson.data.admin;

          const postRes = await fetch(`/admin/posts/${postId}`);
          const postJson = await postRes.json();
          if (!postRes.ok || !postJson.success) throw new Error(postJson.error || "Post not found");

          const post = postJson.data;
          if (String(post.author) !== String(admin._id)) {
            throw new Error("Unauthorized");
          }

          $("#title").val(post.title || "");
          $("#content").val(post.content || "");
        } catch (err) {
          setStatus("Unable to load post for editing", true);
          $("#postForm :input").prop("disabled", true);
        }
      };

      $("#cancelBtn").on("click", function () {
        window.location.href = "/admin/posts/ui";
      });

      $("#logoutBtn").on("click", function () {
        $.post("/admin/logout").always(function () {
          window.location.href = "/admin/login";
        });
      });

      $("#postForm").on("submit", function (e) {
        e.preventDefault();
        setStatus("Saving changes...");

        $.ajax({
          url: `/admin/posts/${postId}`,
          method: "PUT",
          contentType: "application/json",
          data: JSON.stringify({
            title: $("#title").val().trim(),
            content: $("#content").val().trim()
          })
        })
          .done(function (res) {
            if (!res.success) {
              setStatus(res.error || "Failed to update post", true);
              return;
            }
            setStatus("Post updated successfully");
            setTimeout(function () {
              window.location.href = `/admin/posts/${postId}/ui`;
            }, 500);
          })
          .fail(function (xhr) {
            const msg = xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Failed to update post";
            setStatus(msg, true);
          });
      });

      loadPost();
    </script>
    <script src="/sw-register.js"></script>
  </body>
</html>
