<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Detail - BlogPlatform</title>
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #1e2b92;
        --bg: #f3f5f9;
        --text: #121f37;
        --muted: #677d96;
        --line: #dbe3ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Work Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .topbar {
        background: #fff;
        border-bottom: 1px solid var(--line);
        padding: 14px 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 24px;
        font-weight: 800;
        color: var(--primary);
      }

      .brand svg {
        width: 24px;
        height: 24px;
      }

      .menu {
        display: flex;
        gap: 22px;
        align-items: center;
        justify-content: flex-end;
      }

      .menu a,
      .menu button {
        color: #24344f;
        font-size: 14px;
        font-weight: 600;
        border: 0;
        background: transparent;
        padding: 0;
        text-decoration: none;
      }

      .menu a.active {
        color: var(--primary);
      }

      .hero {
        min-height: 520px;
        color: #fff;
        background: linear-gradient(135deg, rgba(10, 29, 75, 0.78), rgba(8, 18, 45, 0.75)),
          radial-gradient(circle at 20% 10%, rgba(95, 130, 180, 0.25), transparent 50%),
          linear-gradient(140deg, #385b88, #0e2348 58%, #091b3a);
        display: flex;
        align-items: flex-end;
      }

      .hero-inner {
        max-width: 1140px;
        width: 100%;
        margin: 0 auto;
        padding: 36px 20px;
      }

      .crumbs {
        font-size: 12px;
        opacity: 0.9;
      }

      .hero-title {
        max-width: 820px;
        margin-top: 10px;
        font-size: 58px;
        font-weight: 800;
        line-height: 1.04;
      }

      .meta {
        margin-top: 18px;
        display: flex;
        gap: 18px;
        align-items: center;
        font-size: 13px;
      }

      .content-wrap {
        max-width: 1140px;
        margin: 0 auto;
        padding: 24px 20px 36px;
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 24px;
      }

      .left-rail {
        align-self: start;
        position: sticky;
        top: 20px;
      }

      .rail-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        margin-bottom: 12px;
        padding: 12px;
      }

      .rail-title {
        font-size: 11px;
        font-weight: 700;
        color: #7a8ea8;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .rail-link {
        display: block;
        color: #2f4663;
        font-size: 13px;
        margin-bottom: 7px;
        text-decoration: none;
      }

      .search-input {
        width: 100%;
        border: 1px solid #d7e0eb;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .progress-mini {
        font-size: 11px;
        color: #7a8ea8;
        margin-bottom: 6px;
      }

      .progress {
        height: 6px;
        border-radius: 999px;
        margin-bottom: 6px;
      }

      .article {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 8px 24px rgba(21, 37, 68, 0.06);
      }

      .article-intro {
        color: #5c7392;
        font-size: 16px;
        font-style: italic;
        font-weight: 400;
        line-height: 1.6;
        margin-bottom: 22px;
        padding: 14px 16px;
        border-left: 4px solid #c8d6ea;
        background: #f7faff;
        border-radius: 8px;
      }

      .article-body {
        font-size: 18px;
        color: #2a425f;
        line-height: 1.95;
        letter-spacing: 0.01em;
      }

      .article-body p {
        margin-bottom: 18px;
      }

      .article-body p:first-child::first-letter {
        float: left;
        font-size: 56px;
        line-height: 0.9;
        font-weight: 800;
        color: var(--primary);
        margin-right: 8px;
        margin-top: 4px;
      }

      .article-tags {
        border-top: 1px solid #e5ecf5;
        margin-top: 20px;
        padding-top: 12px;
      }

      .tag {
        display: inline-block;
        font-size: 12px;
        color: #506b8a;
        margin-right: 10px;
      }

      .state {
        max-width: 1140px;
        margin: 20px auto;
        padding: 18px 20px;
        border: 1px dashed #bfd0e0;
        border-radius: 10px;
        text-align: center;
        color: #445f7e;
        font-size: 18px;
        font-weight: 600;
        background: #fff;
        display: none;
      }

      @media (max-width: 991.98px) {
        .hero-title {
          font-size: 38px;
        }

        .content-wrap {
          padding-top: 20px;
          grid-template-columns: 1fr;
        }

        .left-rail {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="d-flex align-items-center justify-content-between">
        <div class="brand">
          <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 12C8 9.79086 9.79086 8 12 8H36C38.2091 8 40 9.79086 40 12V36C40 38.2091 38.2091 40 36 40H12C9.79086 40 8 38.2091 8 36V12Z" fill="currentColor"></path>
            <path d="M16 16H32V20H16V16Z" fill="#fff"></path>
            <path d="M16 24H32V28H16V24Z" fill="#fff"></path>
            <path d="M16 32H24V36H16V32Z" fill="#fff"></path>
          </svg>
          DevBlog
        </div>
        <nav class="menu">
          <a href="/admin/home">Home</a>
          <a class="active" href="/admin/posts/ui">Blog</a>
          <a href="/admin/me/ui">About</a>
          <a href="/admin/contact/ui">Contact</a>
          <button id="logoutBtn" type="button">Logout</button>
        </nav>
      </div>
    </header>

    <header class="hero" id="heroSection">
      <div class="hero-inner">
        <div class="crumbs" id="crumbs"></div>
        <h1 class="hero-title" id="heroTitle">Loading post...</h1>
        <div class="meta" id="metaRow"></div>
      </div>
    </header>

    <div id="noPost" class="state">No posts available</div>

    <main id="articleWrap" class="content-wrap" style="display: none;">
      <aside class="left-rail">
        <div class="rail-card">
          <div class="rail-title">Search</div>
          <input class="search-input" type="text" placeholder="Search article..." />
        </div>
        <div class="rail-card">
          <div class="rail-title">Navigation</div>
          <a href="#articleBody" class="rail-link">Contents</a>
          <a href="#articleBody" class="rail-link">Full Post</a>
          <a href="#articleTags" class="rail-link">Tags</a>
        </div>
        <div class="rail-card">
          <div class="d-flex align-items-center justify-content-between progress-mini">
            <span>Progress</span>
            <span id="readingProgress">0%</span>
          </div>
          <div class="progress">
            <div id="readingBar" class="progress-bar bg-primary" style="width: 0%;"></div>
          </div>
          <div class="progress-mini" id="readingTime">0 min read</div>
        </div>
      </aside>

      <article class="article">
        <p id="articleIntro" class="article-intro"></p>
        <div id="articleBody" class="article-body"></div>
        <div id="articleTags" class="article-tags"></div>
      </article>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      const postId = window.location.pathname.split("/")[3];

      const escapeHtml = (value) =>
        String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const toParagraphs = (content) =>
        (content || "")
          .split(/\n{2,}/)
          .map((chunk) => chunk.trim())
          .filter(Boolean);

      const buildTags = (title, content) => {
        const tokens = `${title || ""} ${content || ""}`
          .toLowerCase()
          .replace(/[^a-z0-9\s]/g, " ")
          .split(/\s+/)
          .filter((w) => w.length > 4);
        const seen = new Set();
        const result = [];
        for (const token of tokens) {
          if (!seen.has(token)) {
            seen.add(token);
            result.push(token);
          }
          if (result.length === 4) break;
        }
        return result;
      };

      const renderPost = async () => {
        try {
          const meRes = await fetch("/admin/me");
          if (meRes.status === 401) {
            window.location.href = "/admin/login";
            return;
          }
          const meJson = await meRes.json();
          if (!meRes.ok || !meJson.success) throw new Error("Unauthorized");
          const admin = meJson.data.admin;

          const postRes = await fetch(`/admin/posts/${postId}`);
          const postJson = await postRes.json();
          if (!postRes.ok || !postJson.success) throw new Error("Post not found");

          const post = postJson.data;
          if (String(post.author) !== String(admin._id)) {
            throw new Error("No posts available");
          }

          document.getElementById("heroTitle").textContent = post.title;
          document.getElementById("crumbs").textContent = new Date(post.createdAt).toLocaleDateString();
          document.getElementById("metaRow").innerHTML = `<span>${admin.name}</span><span>•</span><span>${new Date(post.createdAt).toLocaleDateString()}</span>`;

          const paragraphs = toParagraphs(post.content);
          const intro = paragraphs[0] || (post.content || "").trim() || "No content available";
          document.getElementById("articleIntro").textContent = intro;

          const bodyParagraphs = paragraphs.length > 1 ? paragraphs.slice(1) : [intro];
          document.getElementById("articleBody").innerHTML = bodyParagraphs
            .map((p) => `<p>${escapeHtml(p)}</p>`)
            .join("");

          const words = (post.content || "").trim().split(/\s+/).filter(Boolean).length;
          const readMinutes = Math.max(1, Math.ceil(words / 200));
          document.getElementById("readingTime").textContent = `${readMinutes} min read`;
          document.getElementById("readingProgress").textContent = "100%";
          document.getElementById("readingBar").style.width = "100%";

          const tags = buildTags(post.title, post.content);
          document.getElementById("articleTags").innerHTML = tags
            .map((tag) => `<span class="tag">#${escapeHtml(tag)}</span>`)
            .join("");

          document.getElementById("articleWrap").style.display = "grid";
          document.getElementById("noPost").style.display = "none";
        } catch (err) {
          document.getElementById("heroTitle").textContent = "Post not available";
          document.getElementById("metaRow").innerHTML = "";
          document.getElementById("noPost").textContent = "No posts available";
          document.getElementById("noPost").style.display = "block";
          document.getElementById("articleWrap").style.display = "none";
        }
      };

      $("#logoutBtn").on("click", function () {
        $.post("/admin/logout").always(function () {
          window.location.href = "/admin/login";
        });
      });

      renderPost();
    </script>
    <script src="/sw-register.js"></script>
  </body>
</html>
